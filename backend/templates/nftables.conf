#!/usr/sbin/nft -f

flush ruleset

# 示例的网络接口，需要根据实际情况调整
define WAN_IF = "pppoe-wan"    #这个名称一般都是pppoe-wan
define LAN_IF = "br-lan"       #这个需要根据实际情况调整

# 示例端口配置，端口范围内都可以修改。
define KNOCK1_PORT = 1
define KNOCK2_PORT = 2
define KNOCK3_PORT = 3
define KNOCK4_PORT = 4
# 示例“端口转发配置”，这个41820， 41825这两个示例端口都是外网访问这两个端口会被对应转发到内网IP下的端口，DSM_IP4为被转发到内网目标服务器的IPV4地址，set nas_ip6为目标IPV6地址（动态IPV6地址，实际内网设备获取的公网IPV6）
# DSM_IP4 已移除，改用 forward_rules 多条规则配置


# 示例用户自定义的端口转发配置2
define ubuntu_ssh = { 22 }
define ubuntu_IP = 192.168.4.188



# 示例信任的IP（管理用），允许内网设备不在内网敲门直接访问主路由
define TRUSTED_IP4 = 192.168.4.229
define TRUSTED_IP6 = fd93:86bb:a142:0:e9d:92ff:fe87:fd28

# 示例路由器的IP地址，也就是配置当前防火墙路由器的网关地址。需要跟随network中的IP进行自动配置。
define ROUTER_IP4 = 192.168.4.1
define ROUTER_IP6 = ""

define LAN_SUBNET4 = 192.168.4.0/24
define LAN_BROADCAST4 = 192.168.4.255
define ULA_PREFIX6 = fd93:86bb:a142::/60
define WAN_PREFIX6 = 240e:390:4944:b191::/64

#==============主防火墙=============
table inet fw4 {
    # PORT_SETS_BLOCK
    # ==================== IPv4 集合 ====================
#  经过敲门的外网访问用户允许访问的时间限制，5小时内可以随时访问，5小时后需要敲门。
    set allowed4 {
        type ipv4_addr;
        flags timeout;
        timeout 5h;
    }
#  第一次敲门到第二次敲门中间的间隔时间，固定
    set knock1_done4 {
        type ipv4_addr;
        flags timeout;
        timeout 8s;
    }
#  第二次敲门到第三次敲门中间的间隔时间，固定
    set knock2_done4 {
        type ipv4_addr;
        flags timeout;
        timeout 8s;
    }
#  第三次敲门到第四次敲门的中间间隔时间，固定
    set knock3_done4 {
        type ipv4_addr;
        flags timeout;
        timeout 8s;
    }
    
    # CHINA_IP_SET_BLOCK
        # 黑名单
    set blacklist4 {
        type ipv4_addr;
    }
    # 第一次敲错门加入合集
    set error_ips4 {
        type ipv4_addr;
        flags timeout;
        timeout 300s;
    }
    # ==================== IPv6 集合 ====================
    # 以下 IPv6 集合根据端口转发规则动态生成，每个规则一个独立集合
# IPV6_SETS_BLOCK
#  IPV6白名单
    set allowed6 {
        type ipv6_addr;
        flags timeout;
        timeout 5h;
    }
#  第一次敲门到第二次敲门中间的间隔时间，固定
    set knock1_done6 {
        type ipv6_addr;
        flags timeout;
        timeout 8s;
    }
#  第二次敲门到第三次敲门中间的间隔时间，固定    
    set knock2_done6 {
        type ipv6_addr;
        flags timeout;
        timeout 8s;
    }
    #  第三次敲门到第四次敲门的中间间隔时间，固定
    set knock3_done6 {
        type ipv6_addr;
        flags timeout;
        timeout 8s;
    }
    #IPV6黑名单
    set blacklist6 {
        type ipv6_addr;
    }
    # IPV6第一次敲错门加入合集
    set error_ips6 {
        type ipv6_addr;
        flags timeout;
        timeout 300s;
    }

    # ======================== 输入链 ========================
#这里开始，到标识“chain input结束”为固定段，无需修改于自定义
    chain input {
        type filter hook input priority filter; policy drop;
        iifname $WAN_IF ether type 0x8863 accept comment "PPPoE Discovery"
        iifname $WAN_IF ether type 0x8864 accept comment "PPPoE Session"
        iifname $WAN_IF ether type 0xc021 accept comment "PPP LCP"

        #udp dport {$KNOCK1_PORT, $KNOCK2_PORT, $KNOCK3_PORT, $KNOCK4_PORT} \
            #log prefix "[KNOCK-PACKET] " level info
        #meta nfproto ipv6 log prefix "[IPv6-INPUT] " 

        udp dport 1900 ip daddr != 255.255.255.255 log prefix "[port1900-drop] " drop

        #僵尸网络端口集合防护
        iifname $WAN_IF tcp dport { 25, 135, 139, 445, 1433, 3389 } log prefix "[BOTNET-PORT] " drop
        iifname $WAN_IF udp dport { 137,123, 138, 1900, 5353 } log prefix "[BOTNET-UDP] " drop

        #全局dncpv6防洪水+IPV6地址获取直接放行
        udp dport {546,547} limit rate 100/second burst 200 packets accept
        udp dport {546,547} limit rate 200/second burst 400 packets log prefix "[DHCPv6-FLOOD] " drop

        # 基础放行
        iif "lo" accept;
        ct state { established, related } accept;
        ct state invalid drop
        #ct state invalid log prefix "[INVALID-STATE] " drop

        # ========== 核心防御规则 ==========
        # 2. 碎片攻击防御（WAN口特别需要）
        iifname $WAN_IF ip frag-off & 0x1fff != 0 \
            log prefix "[FRAG-ATTACK] " drop
        iifname $WAN_IF ip6 nexthdr ipv6-frag \
            log prefix "[IPV6-FRAG-ATTACK] " drop
    
        # 3. LAND攻击防御
        # IPv4 LAND攻击
        iifname $WAN_IF ip saddr . ip daddr { 0.0.0.0 . 0.0.0.0 } \
            log prefix "[LAND-ATTACK-IP4] " drop
    
        # IPv6 LAND攻击  
        iifname $WAN_IF ip6 saddr . ip6 daddr { :: . :: } \
            log prefix "[LAND-ATTACK-IP6] " drop
    
        # 4. TCP异常扫描防御
        iifname $WAN_IF tcp flags & (fin|psh|urg) == fin|psh|urg \
            log prefix "[XMAS-SCAN] " drop
        iifname $WAN_IF tcp flags & (fin|syn|rst|psh|ack|urg) == 0 \
            log prefix "[NULL-SCAN] " drop

        # SYN 洪水防护
        tcp flags & (fin | syn | rst | ack) == syn jump syn_flood;
        #新：内网IPV6通行
        iifname $LAN_IF ip6 saddr fe80::/10 accept
        iifname $WAN_IF ip6 saddr fe80::/10 log prefix "[WAN-SPOOFED-IP6] " drop

        #新：允许ULA内网通信
		iifname $LAN_IF ip6 saddr $ULA_PREFIX6 accept

        # 黑名单拦截
        ip saddr @blacklist4 log prefix "[BLACKLIST4] " drop
        ip6 saddr @blacklist6 log prefix "[BLACKLIST6] " drop

        # 伪装IP拦截（IPv4）
        iifname $WAN_IF ip saddr {
            $LAN_SUBNET4,
            192.168.0.0/16,
            10.0.0.0/8,
            10.0.1.0/24,
            172.16.0.0/12,
            172.16.1.0/24
        } log prefix "[WAN-SPOOFED-IP4] " drop

        # 伪装IP拦截（IPv6）
        iifname $WAN_IF ip6 saddr {
            $ULA_PREFIX6,
            fe80::/10,
            $WAN_PREFIX6
        } log prefix "[SPOOFED-IP6] " drop

        iifname $LAN_IF ip6 saddr $WAN_PREFIX6 \
            log prefix "[LAN-PU-IP6] " drop

        #接口分发
        iifname $LAN_IF jump input_lan
        iifname $WAN_IF jump input_wan

        # 兜底拒绝
        limit rate 2/minute drop
    }
#chain input结束，以上为固定端，无需修改。
    # ======================== LAN 输入链 ========================
    chain input_lan {
        # IPv6 NDP，固定，无需修改
        icmpv6 type { nd-neighbor-solicit, nd-neighbor-advert, nd-router-solicit, nd-router-advert } accept
        # DHCP，固定配置，无需修改
        udp dport {67,68,546,547} accept
        # DNS，固定配置，无需修改
        udp dport 53 accept
        tcp dport 53 accept
        # DHCPv6 服务器规则
        # Samba广播，固定配置，无需修改
        udp dport {137,138} ip daddr { 255.255.255.255, $LAN_BROADCAST4 } accept
# 局域网端口敲门，规则固定无需修改，变量跟随前面的定义
        meta nfproto ipv4 udp dport { $KNOCK1_PORT, $KNOCK2_PORT, $KNOCK3_PORT, $KNOCK4_PORT } jump knock_lan

        # ========== 核心服务放行 ==========
        # 信任IP直接放行，仅信任模式下起作用。
        ip saddr $TRUSTED_IP4 accept
        ip6 saddr $TRUSTED_IP6 accept
        
        # 授权访问（IPv4），内网敲门后的白名单放行，无需修改
        ip saddr @allowed4 tcp dport @tcp_services accept
        ip saddr @allowed4 icmp type { echo-request, echo-reply } accept
# LAN_MODE_BLOCK
    }
    
    # ==================== 错误处理链 ====================# 固定规则，无需修改
    chain add_to_blacklist4 {
        add @blacklist4 { ip saddr } 
        delete @error_ips4 { ip saddr }
        log prefix "[BLACKLIST4-ADD] " drop
    }
    
    chain add_to_blacklist6 {
        add @blacklist6 { ip6 saddr } 
        delete @error_ips6 { ip6 saddr }
        log prefix "[BLACKLIST6-ADD] " drop
    }

    # ======================== WAN 输入链 ========================
    chain input_wan {
        # 境外 IP 拦截，固定规则，但是分为两个，可以记录国外IP访问日志和不记录日志，可以设置一个开关进行切换配置,上面的是带日志的，下面的是不带日志的。
# CHINA_IP_FILTER_BLOCK
        #========== 必需IPv6协议 ==========固定配置，无需修改
        icmpv6 type {
            nd-neighbor-solicit,
            nd-neighbor-advert,
            destination-unreachable,
            parameter-problem,
            packet-too-big,
            time-exceeded,
            mld-listener-query,
            mld-listener-report,
            nd-router-solicit,
            nd-router-advert
        } iifname $WAN_IF limit rate 10/second burst 20 packets log prefix "[ICMPV6-SCAN-ACCEPT] " accept
        #以上为IPV6之必须协议
            #echo-request,
            #echo-reply,
        # 4. DHCPv6运营商服务器端口546必须开放，547放在lan口，/minute可以改，一般5-10 比较好，固定配置，无需修改。
        udp dport {546,547} limit rate 15/minute burst 10 packets accept
        iifname $WAN_IF udp dport {546,547} log prefix "[WAN-DHCPv6-546/547] " level info

        # ========== ipv4和v6敲门跳转 ========== 固定配置，无需修改
        meta nfproto ipv4 udp dport { $KNOCK1_PORT, $KNOCK2_PORT, $KNOCK3_PORT, $KNOCK4_PORT } jump knock_wan_v4
        meta nfproto ipv6 udp dport { $KNOCK1_PORT, $KNOCK2_PORT, $KNOCK3_PORT, $KNOCK4_PORT } jump knock_wan_v6

        # ========== 服务放行 ==========自定义配置，根据前面的“端口转发”协同的配置wan链配置，整套配置的第一段，经过端口敲门后加入白名单的wanIP允许访问TCP_SERVICES，但是这个“TCP_SERVICES”属于自定义名称，但是需要和前面端口的定义名称对上
        # IPv4授权访问
        ip saddr @allowed4 tcp dport @tcp_services log prefix "[I4-ALV-T] " accept
        ip saddr @allowed4 udp dport @udp_services log prefix "[I4-ALV-UDP] " accept

        # IPv6授权访问
        ip6 saddr @allowed6 tcp dport @tcp_services accept
        ip6 saddr @allowed6 udp dport @udp_services accept
        # 丢弃其他所有流量，第一套是带日志的wan口拒绝流量日志，第二个是不带日志的wan口流量拒绝。配置一个按钮进行切换。
        #meta nfproto ipv6 log prefix "[IPv6-WAN-DROP] " drop
        #meta nfproto ipv4 log prefix "[IPv4-WAN-DROP] " drop
        #以上是下面带日志的平替，需要查看拦截调试的时候解除注释
        meta nfproto ipv6 drop
        meta nfproto ipv4 drop
    }

#    端口敲门wan口配置，固定无需修改
    chain knock_wan_v4 {
        udp dport { $KNOCK1_PORT, $KNOCK2_PORT, $KNOCK3_PORT, $KNOCK4_PORT } ip saddr @error_ips4 jump add_to_blacklist4
        # 第一步敲门
        udp dport $KNOCK1_PORT \
            limit rate 1/minute burst 1 packets \
            add @knock1_done4 { ip saddr } \
            log prefix "[KNOCK4-OK-S1] " \
            drop
        # 第二步敲门 - 正确
        udp dport $KNOCK2_PORT ip saddr @knock1_done4 \
            limit rate 1/minute burst 1 packets  \
            add @knock2_done4 { ip saddr } \
            log prefix "[KNOCK4-OK-S2] " \
            drop
        # 第二步敲门 - 错误
        udp dport $KNOCK2_PORT ip saddr != @knock1_done4 ip saddr @error_ips4 \
            jump add_to_blacklist4
    
        udp dport $KNOCK2_PORT ip saddr != @knock1_done4 ip saddr != @error_ips4 \
            log prefix "[KNOCK-ERR-S2] " \
            add @error_ips4 { ip saddr timeout 30s } \
            drop

        # 第三步敲门 - 正确
        udp dport $KNOCK3_PORT ip saddr @knock2_done4 \
            limit rate 1/minute burst 1 packets \
            add @knock3_done4 { ip saddr } \
            log prefix "[KNOCK4-OK-S3] " \
            drop
        # 第三步敲门 - 错误
        udp dport $KNOCK3_PORT ip saddr != @knock2_done4 ip saddr @error_ips4 \
            jump add_to_blacklist4
    
        udp dport $KNOCK3_PORT ip saddr != @knock2_done4 ip saddr != @error_ips4 \
            log prefix "[KNOCK-ERR-S3] " \
            add @error_ips4 { ip saddr timeout 30s } \
            drop
        # 第四步敲门 - 正确
        udp dport $KNOCK4_PORT ip saddr @knock3_done4 \
            limit rate 1/minute burst 1 packets \
            add @allowed4 { ip saddr } \
            log prefix "[WAN-KNOCK4-SUCCEED] " drop
        # 第四步敲门 - 错误
        udp dport $KNOCK4_PORT ip saddr != @knock3_done4 ip saddr @error_ips4 \
            jump add_to_blacklist4
    
        udp dport $KNOCK4_PORT ip saddr != @knock3_done4 ip saddr != @error_ips4 \
            log prefix "[KNOCK-ERR-S4] " \
            add @error_ips4 { ip saddr timeout 30s } \
            drop

        # 兜底：丢弃所有未被前面规则处理的包（理论上不应发生）
        log prefix "[KNOCK-WAN4-UNMATCHED] " drop
    }
#  端口敲门IPV6 WAN口配置，无需修改
    chain knock_wan_v6 {
        udp dport { $KNOCK1_PORT, $KNOCK2_PORT, $KNOCK3_PORT, $KNOCK4_PORT } ip6 saddr @error_ips6 jump add_to_blacklist6
        # 第一步敲门
        udp dport $KNOCK1_PORT \
            limit rate 1/minute burst 1 packets \
            add @knock1_done6 { ip6 saddr } \
            log prefix "[KNOCK6-OK-S1] " \
            drop
        # 第二步敲门 - 正确
        udp dport $KNOCK2_PORT ip6 saddr @knock1_done6 \
            limit rate 1/minute burst 1 packets \
            add @knock2_done6 { ip6 saddr } \
            log prefix "[KNOCK6-OK-S2] " \
            drop
        # 第二步敲门 - 错误
        udp dport $KNOCK2_PORT ip6 saddr != @knock1_done6 ip6 saddr @error_ips6 \
            jump add_to_blacklist6
    
        udp dport $KNOCK2_PORT ip6 saddr != @knock1_done6 ip6 saddr != @error_ips6 \
            log prefix "[KNOCK-ERR-S2] " \
            add @error_ips6 { ip6 saddr timeout 30s } \
            drop
        # 第三步敲门 - 正确
        udp dport $KNOCK3_PORT ip6 saddr @knock2_done6 \
            limit rate 1/minute burst 1 packets \
            add @knock3_done6 { ip6 saddr } \
            log prefix "[KNOCK6-OK-S3] " \
            drop
        # 第三步敲门 - 错误
        udp dport $KNOCK3_PORT ip6 saddr != @knock2_done6 ip6 saddr @error_ips6 \
            jump add_to_blacklist6
    
        udp dport $KNOCK3_PORT ip6 saddr != @knock2_done6 ip6 saddr != @error_ips6 \
            log prefix "[KNOCK-ERR-S3] " \
            add @error_ips6 { ip6 saddr timeout 30s } \
            drop
        # 第四步敲门 - 正确
        udp dport $KNOCK4_PORT ip6 saddr @knock3_done6 \
            limit rate 1/minute burst 1 packets \
            add @allowed6 { ip6 saddr } \
            log prefix "[WAN-KNOCK4-SUCCEED] " drop
        # 第四步敲门 - 错误
        udp dport $KNOCK4_PORT ip6 saddr != @knock3_done6 ip6 saddr @error_ips6 \
            jump add_to_blacklist6
    
        udp dport $KNOCK4_PORT ip6 saddr != @knock3_done6 ip6 saddr != @error_ips6 \
            log prefix "[KNOCK-ERR-S4] " \
            add @error_ips6 { ip6 saddr timeout 30s } \
            drop
        # 兜底：丢弃所有未被前面规则处理的包（理论上不应发生）
        log prefix "[KNOCK-WAN6-UNMATCHED] " drop
    }
# lan端口敲门，无需修改
    chain knock_lan {
        # ========== IPv4 敲门流程 ==========
        iifname $LAN_IF udp dport $KNOCK1_PORT ip saddr != $TRUSTED_IP4 \
            add @knock1_done4 { ip saddr } \
            log prefix "[LAN-KNOCK1] " drop

        iifname $LAN_IF udp dport $KNOCK2_PORT ip saddr @knock1_done4 \
            add @knock2_done4 { ip saddr } \
            log prefix "[LAN-KNOCK2] " drop

        iifname $LAN_IF udp dport $KNOCK3_PORT ip saddr @knock2_done4 \
            add @knock3_done4 { ip saddr } \
            log prefix "[LAN-KNOCK3] " drop

        iifname $LAN_IF udp dport $KNOCK4_PORT ip saddr @knock3_done4 \
            add @allowed4 { ip saddr } \
            log prefix "[LAN-KNOCK4-SUCCEED] " drop
        log prefix "[KNOCK-LAN-UNMATCHED] " drop
    }

    # ======================== 转发链 ========================
    chain forward {
#  无需修改的配置
        type filter hook forward priority filter; policy drop
#  记录所有IPV6访问日志，日志很多，配置一个开关，但是要有提示日志很多，建议关闭。
        #iifname $WAN_IF oifname $LAN_IF meta nfproto ipv6 \
        #    log prefix "[IPv6-WAN-to-LAN-ATTEMPT] "
        #记录所有IPV6访问内网的信息，实测日志会很多，处理器压力大，可选
#固定配置，无需修改
        ct state { established, related } accept
# 以下为端口敲门后的白名单访问端口后，配套“端口转发配置”的转发链规则，整套配置的第二段，被转发到内部IP设备的配置，其中nas_ip6就是之前说的动态IPV6合集，nas_ip6为自定义名称，可以修改，但是生成规则的时候，规则需要按照我写的方案。
        # ========== IPv6 敲门成功访问规则（动态生成） ==========
# IPV6_FWD_RULES_BLOCK

        # ========== IPv4 敲门成功访问规则（动态生成） ==========
# FORWARD_RULES_BLOCK
# 以下为固定配置，不要修改。
        # 拒绝WAN→LAN的NDP
        iifname $WAN_IF oifname $LAN_IF meta nfproto ipv6 \
            icmpv6 type { nd-neighbor-solicit, nd-neighbor-advert } \
            log prefix "[I6-NDP-DE] " drop
        # IPV6 拒绝日志（动态生成）
# IPV6_DEN_RULES_BLOCK


                iifname $LAN_IF oifname $LAN_IF meta nfproto ipv6 \
            icmpv6 type { nd-neighbor-solicit, nd-neighbor-advert } \
            accept comment "IPv6 NDP within LAN"

        #运行内网到内网的dns查询
        # 3. 内网→外网：仅放行必要流量（收紧LAN→WAN，核心修改）
        # 放行内网→外网的DNS（仅允许访问路由器/指定公网DNS，避免任意DNS）
        iifname $LAN_IF oifname $WAN_IF meta nfproto ipv6 udp dport 53 ip6 daddr { $ROUTER_IP6, 2400:3200::1, 2400:3200:baba::1 } accept
        iifname $LAN_IF oifname $WAN_IF meta nfproto ipv6 tcp dport 53 ip6 daddr { $ROUTER_IP6, 2400:3200::1, 2400:3200:baba::1 } accept
        iifname $LAN_IF oifname $WAN_IF meta nfproto ipv4 udp dport 53 ip daddr { $ROUTER_IP4, 114.114.114.114, 223.5.5.5 } accept
        iifname $LAN_IF oifname $WAN_IF meta nfproto ipv4 tcp dport 53 ip daddr { $ROUTER_IP4, 114.114.114.114, 223.5.5.5 } accept  # 新增

        # 允许其他所有LAN→WAN
        iifname $LAN_IF oifname $WAN_IF accept

        # 拒绝其他转发
        meta nfproto ipv6 drop
        meta nfproto ipv4 drop
    }
#  固定配置，无需修改
    # ======================== 基础服务链 ========================
    chain syn_flood {
        limit rate 25/second burst 50 packets return
        drop
    }

    chain handle_reject {
        iifname $WAN_IF drop
        meta l4proto tcp reject with tcp reset
        log prefix "[FORWARD-DROP] " drop
    }

    chain reject_from_wan {
        log prefix "[FORWARD-DROP1] " drop
    }
}

# ======================== NAT 表 ========================
table ip nat {
    chain prerouting {
# 固定配置，无需修改
        type nat hook prerouting priority dstnat;
        # 群晖服务端口转发（明确指定为IPv4）端口转发，前面说的“端口转发配置”的nat配置，配套生成的配置第三段。
        # 动态端口转发 NAT 规则
# NAT_RULES_BLOCK
    }
# 固定配置，无需修改
    chain postrouting {
        type nat hook postrouting priority srcnat;
        oifname $WAN_IF masquerade
        # PPPoE MSS 钳制
        oifname $WAN_IF tcp flags syn tcp option maxseg size set 1452
    }
}

# CHINA_IP_INCLUDE_BLOCK
